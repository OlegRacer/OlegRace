<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кутомір для Скутера (Одна Вісь)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        .direction {
            font-size: 1.8rem;
            text-transform: uppercase;
            font-weight: bold;
            color: #888;
            margin-bottom: 10px;
        }

        .angle-display {
            font-size: 6rem;
            font-weight: bold;
            margin: 10px 0;
        }

        /* Шкала */
        .gauge-container {
            width: 100%;
            height: 16px;
            background-color: #222;
            border-radius: 8px;
            margin: 25px 0;
            position: relative;
            border: 1px solid #444;
        }

        .gauge-pointer {
            width: 24px;
            height: 24px;
            background-color: #00ff88;
            border-radius: 50%;
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 15px #00ff88;
        }

        .center-line {
            position: absolute;
            width: 3px;
            height: 26px;
            background-color: #ff3333;
            left: 50%;
            top: -5px;
        }

        .btn {
            background-color: #ff9f43;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 159, 67, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .status {
            font-size: 1rem;
            color: #666;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status">Закріпіть телефон ГОРИЗОНТАЛЬНО (боком)</div>
    <div class="direction" id="direction">ЦЕНТР</div>
    <div class="angle-display" id="angle">0°</div>
    
    <div class="gauge-container">
        <div class="center-line"></div>
        <div class="gauge-pointer" id="pointer"></div>
    </div>

    <button class="btn" id="calibBtn">Пошук Нуля</button>
    <div class="status" id="status">Вирівняйте скутер і натисніть кнопку</div>
</div>

<script>
    let zeroOffset = 0;

    const angleDisplay = document.getElementById('angle');
    const directionDisplay = document.getElementById('direction');
    const pointer = document.getElementById('pointer');
    const calibBtn = document.getElementById('calibBtn');
    const statusDisplay = document.getElementById('status');

    function handleOrientation(event) {
        // Для ГОРИЗОНТАЛЬНОГО режиму вісь beta відповідає за нахил вліво/вправо.
        // Вона абсолютно ізольована від того, чи нахилений екран вперед/назад до водія.
        let currentRawAngle = event.beta; 

        if (currentRawAngle === null) return;

        // Враховуємо калібрування нуля
        let calculatedAngle = currentRawAngle - zeroOffset;

        // Корекція кутів (-180 до 180)
        if (calculatedAngle > 180) calculatedAngle -= 360;
        if (calculatedAngle < -180) calculatedAngle += 360;

        // Округлення
        let finalAngle = parseFloat(calculatedAngle.toFixed(1));
        let absAngle = Math.abs(finalAngle);

        angleDisplay.innerText = `${absAngle.toFixed(1)}°`;

        // Визначаємо напрямок (вліво чи вправо залежить від того, якою стороною вбік лежить телефон, 
        // якщо показує навпаки — просто зміни знаки мінуса в умові нижче)
        if (finalAngle > 0.5) {
            directionDisplay.innerText = "Нахил Вправо ➔";
            directionDisplay.style.color = "#00ff88";
        } else if (finalAngle < -0.5) {
            directionDisplay.innerText = "➦ Нахил Вліво";
            directionDisplay.style.color = "#ff3366";
        } else {
            directionDisplay.innerText = "ЦЕНТР";
            directionDisplay.style.color = "#888";
            angleDisplay.innerText = "0.0°";
        }

        // Візуалізація на шкалі (макс кут для шкали візьмемо 40 градусів)
        let maxGaugeAngle = 40;
        let percent = 50 + (finalAngle / maxGaugeAngle) * 50;
        percent = Math.max(0, Math.min(100, percent)); 
        pointer.style.left = `${percent}%`;
    }

    calibBtn.addEventListener('click', () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        runCalibration();
                    } else {
                        statusDisplay.innerText = "Помилка: доступ до датчиків відхилено.";
                    }
                })
                .catch(console.error);
        } else {
            runCalibration();
        }
    });

    function runCalibration() {
        window.addEventListener('deviceorientation', function setZero(event) {
            if(event.beta !== null) {
                zeroOffset = event.beta; // Запам'ятовуємо кут нахилу вперед/назад як ноль
                statusDisplay.innerText = "Нуль знайдено! Кут зафіксовано.";
                statusDisplay.style.color = "#00ff88";
                
                window.removeEventListener('deviceorientation', setZero);
                window.addEventListener('deviceorientation', handleOrientation);
            }
        });
    }
</script>

</body>
</html>
