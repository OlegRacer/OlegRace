<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кутомір</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .container {
            margin-top: 50px;
        }
        .angle-display {
            font-size: 5rem;
            font-weight: bold;
            color: #00ffcc;
        }
        .speed-display {
            font-size: 1.5rem;
            color: #aaaaaa;
            margin-bottom: 20px;
        }
        .orientation-badge {
            display: inline-block;
            background-color: #333;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: #ffeb3b;
        }
        button {
            background-color: #ff5722;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Кут нахилу</h1>
        <div id="orientationMode" class="orientation-badge">Визначення...</div>
        <div class="speed-display">Швидкість: <span id="speed">0</span> км/год</div>
        <div class="angle-display"><span id="angle">0</span>°</div>
        <p id="direction">Рівно</p>
        <br><br>
        <button id="startBtn">Увімкнути датчики</button>
    </div>

    <script>
        let currentAngle = 0;
        let speedMPS = 0;
        let isLandscape = false;

        const angleElement = document.getElementById('angle');
        const speedElement = document.getElementById('speed');
        const directionElement = document.getElementById('direction');
        const orientationBadge = document.getElementById('orientationMode');
        const startBtn = document.getElementById('startBtn');

        function checkOrientation() {
            isLandscape = window.innerWidth > window.innerHeight;
            if (isLandscape) {
                orientationBadge.innerText = "Режим: Альбомний";
            } else {
                orientationBadge.innerText = "Режим: Портретний";
            }
        }

        window.addEventListener('resize', checkOrientation);
        checkOrientation();

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((position) => {
                if (position.coords.speed !== null) {
                    speedMPS = position.coords.speed;
                    speedElement.innerText = Math.round(speedMPS * 3.6);
                }
            }, (error) => {}, { enableHighAccuracy: true });
        }

        startBtn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        startBtn.style.display = 'none';
                    }
                } catch (error) {
                    alert('Помилка: ' + error);
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                startBtn.style.display = 'none';
            }
        });

        function handleOrientation(event) {
            let targetRoll = 0;

            if (isLandscape) {
                let orientationAngle = window.orientation || 0;
                if (orientationAngle < 0) {
                    targetRoll = event.beta; 
                } else {
                    targetRoll = -event.beta;
                }
            } else {
                targetRoll = event.gamma;
            }

            currentAngle = (0.85 * currentAngle) + (0.15 * targetRoll);
            let displayAngle = Math.round(currentAngle);

            angleElement.innerText = Math.abs(displayAngle);

            if (displayAngle > 3) {
                directionElement.innerText = "Нахил праворуч 👉";
                directionElement.style.color = "#ff5722";
            } else if (displayAngle < -3) {
                directionElement.innerText = "👈 Нахил ліворуч";
                directionElement.style.color = "#ff5722";
            } else {
                directionElement.innerText = "Рівно 🏍️";
                directionElement.style.color = "#00ffcc";
            }
        }
    </script>
</body>
</html>
