<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Розумний Кутомір для Скутера</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            transition: background-color 0.3s;
        }
        .container {
            margin-top: 50px;
        }
        .angle-display {
            font-size: 5rem;
            font-weight: bold;
            color: #00ffcc;
        }
        .speed-display {
            font-size: 1.5rem;
            color: #aaaaaa;
            margin-bottom: 20px;
        }
        .orientation-badge {
            display: inline-block;
            background-color: #333;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: #ffeb3b;
        }
        button {
            background-color: #ff5722;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Кут нахилу скутера</h1>
        <div id="orientationMode" class="orientation-badge">Визначення орієнтації...</div>
        <div class="speed-display">Швидкість: <span id="speed">0</span> км/год</div>
        <div class="angle-display"><span id="angle">0</span>°</div>
        <p id="direction">Рівно</p>
        
        <br><br>
        <button id="startBtn">Увімкнути датчики</button>
    </div>

    <script>
        let currentAngle = 0;
        let speedMPS = 0;
        let isLandscape = false;

        const angleElement = document.getElementById('angle');
        const speedElement = document.getElementById('speed');
        const directionElement = document.getElementById('direction');
        const orientationBadge = document.getElementById('orientationMode');
        const startBtn = document.getElementById('startBtn');

        // 1. Функція перевірки орієнтації екрана
        function checkOrientation() {
            // Перевіряємо сучасне API або старе window.orientation
            if (screen.orientation && screen.orientation.type) {
                isLandscape = screen.orientation.type.includes('landscape');
            } else {
                isLandscape = Math.abs(window.orientation) === 90;
            }

            // Оновлюємо текст на екрані для користувача
            if (isLandscape) {
                orientationBadge.innerText = "Режим: Горизонтальний (Альбомний)";
            } else {
                orientationBadge.innerText = "Режим: Вертикальний (Портретний)";
            }
        }

        // Слідкуємо за поворотом екрана в реальному часі
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', checkOrientation);
        checkOrientation(); // Первинна перевірка при завантаженні

        // 2. GPS швидкість
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((position) => {
                if (position.coords.speed !== null) {
                    speedMPS = position.coords.speed;
                    speedElement.innerText = Math.round(speedMPS * 3.6);
                }
            }, (error) => console.log(error), { enableHighAccuracy: true });
        }

        // 3. Запуск датчиків після кліку
        startBtn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        startBtn.style.display = 'none';
                    }
                } catch (error) {
                    alert('Доступ відхилено: ' + error);
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                startBtn.style.display = 'none';
            }
        });

        // 4. Обробка нахилу з автовибором осі
        function handleOrientation(event) {
            let targetRoll = 0;

            if (isLandscape) {
                // В альбомному режимі за нахил вліво/вправо відповідає вісь BETA
                // Додатково інвертуємо знак (-), залежно від того, в який саме бік повернуто телефон (90 чи -90 градусів)
                let orientationAngle = window.orientation || (screen.orientation && screen.orientation.angle) || 0;
                targetRoll = orientationAngle < 0 ? event.beta : -event.beta;
            } else {
                // В портретному режимі за нахил вліво/вправо відповідає вісь GAMMA
                targetRoll = event.gamma;
            }

            // Згладжування (Фільтр низьких частот), щоб прибрати вібрації від коліс/мотора
            currentAngle = (0.85 * currentAngle) + (0.15 * targetRoll);
            let displayAngle = Math.round(currentAngle);

            // Виводимо значення
            angleElement.innerText = Math.abs(displayAngle);

            // Визначаємо напрямок
            if (displayAngle > 3) {
                directionElement.innerText = "Нахил праворуч 👉";
                directionElement.style.color = "#ff5722";
            } else if (displayAngle < -3) {
                directionElement.innerText = "👈 Нахил ліворуч";
                directionElement.style.color = "#ff5722";
            } else {
                directionElement.innerText = "Рівно 🏍️";
                directionElement.style.color = "#00ffcc";
            }
        }
    </script>
</body>
</html>
