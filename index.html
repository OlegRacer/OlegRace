<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>aRacer Dash</title>
<style>
:root{
  --bg:#000;--panel:#0d0d0f;--line:rgba(255,255,255,0.07);
  --text:#f2f2f0;--muted:#666;
  --cyan:#37e0e6;--amber:#ffb74d;--red:#ff4d4d;
  --green:#4ade80;--blue:#3b82f6;--yellow:#ffd23f;
  --th:48px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;}
html,body{margin:0;padding:0;height:100%;width:100%;
  background:#000;color:var(--text);
  font-family:'Rajdhani','Segoe UI',sans-serif;
  overflow:hidden;-webkit-font-smoothing:antialiased;}

/* TOPBAR */
.tb{position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;gap:5px;
  padding:max(5px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) 5px max(10px,env(safe-area-inset-left));
  background:rgba(0,0,0,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);height:var(--th);}
.tbi{display:flex;align-items:center;justify-content:center;
  width:38px;height:32px;border-radius:6px;
  background:var(--panel);border:1px solid var(--line);
  font-size:14px;font-weight:600;color:var(--text);transition:all 0.15s;}
.tbi.active{background:var(--cyan);color:#000;border-color:var(--cyan);}
.tbi.err{background:var(--red);color:#000;border-color:var(--red);}
.tbi.warn{background:var(--amber);color:#000;border-color:var(--amber);}
.tbi.ok{background:var(--green);color:#000;border-color:var(--green);}
.tbi:active{transform:scale(0.95);opacity:0.8;}
.tbi.stst{font-size:11px;font-weight:700;letter-spacing:-0.5px;}
.tbf{flex:1;}

/* DASHBOARD LAYOUT */
.db{position:absolute;top:var(--th);bottom:0;left:0;right:0;
  padding:max(10px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) max(10px,env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left));
  display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:minmax(80px,1fr);gap:10px;overflow-y:auto;}

/* TILES */
.tl{background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:10px;display:flex;flex-direction:column;position:relative;overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s;}
.tl.s1{grid-column:span 1;grid-row:span 1;}
.tl.s21{grid-column:span 2;grid-row:span 1;}
.tl.s22{grid-column:span 2;grid-row:span 2;}
.tl.edit-mode{border-color:var(--cyan);box-shadow:0 0 8px rgba(55,224,230,0.15);cursor:pointer;}
.tl.edit-mode::after{content:'⚙';position:absolute;top:5px;right:5px;font-size:12px;color:var(--cyan);opacity:0.8;}

/* TILE CONTENT */
.tn{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;}
.tv-w{flex:1;display:flex;align-items:baseline;min-height:0;}
.tv{font-size:38px;font-weight:700;font-family:monospace;line-height:1;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tl.s21 .tv{font-size:46px;}
.tl.s22 .tv{font-size:64px;}
.tu{font-size:14px;font-weight:600;color:var(--muted);margin-left:4px;}

/* GAUGE STYLES */
.g-w{position:absolute;bottom:0;left:0;right:0;height:6px;background:rgba(255,255,255,0.03);}
.g-b{height:100%;width:0%;transition:width 0.1s linear,background-color 0.2s;}

/* EDIT MODAL */
.em{position:fixed;top:0;bottom:0;left:0;right:0;z-index:100;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);
  display:flex;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.em.sh{opacity:1;pointer-events:auto;}
.em-c{width:100%;max-width:380px;background:#000;border-left:1px solid var(--line);
  height:100%;display:flex;flex-direction:column;transform:translateX(50px);transition:transform 0.25s;}
.em.sh .em-c{transform:translateX(0);}
.em-h{padding:15px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.em-t{font-size:18px;font-weight:700;margin:0;flex:1;}
.em-x{background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:5px;line-height:1;}
.em-b{flex:1;overflow-y:auto;padding:15px;}

/* EDIT ITEMS */
.gt{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:15px 0 8px 0;}
.gt:first-child{margin-top:0;}
.pl,.sr,.szr{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.pl{grid-template-columns:1fr;}
.pi,.sb{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px;
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.15s;}
.sb{justify-content:center;font-weight:600;font-size:14px;padding:12px 8px;}
.pi:active,.sb:active{transform:scale(0.98);}
.pi.sel,.sb.sel{border-color:var(--cyan);background:rgba(55,224,230,0.05);}
.pn2{font-weight:600;font-size:14px;}
.pc{font-size:11px;color:var(--muted);margin-left:5px;font-weight:500;}
.ck{color:var(--cyan);font-weight:700;display:none;}
.pi.sel .ck{display:block;}
.ab{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);
  border-radius:8px;padding:12px;font-weight:600;font-size:14px;cursor:pointer;margin-top:10px;
  display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.15s;}
.ab:active{transform:scale(0.98);}
.ab.pr{background:var(--cyan);color:#000;border-color:var(--cyan);}
.ab.dn{border-color:rgba(255,77,77,0.2);color:var(--red);}
</style>
</head>
<body>

<div class="tb">
  <button class="tbi stst warn" id="btnBle">BLE</button>
  <button class="tbi stst err" id="btnEcu">ECU</button>
  <div class="tbi" id="valVolt">--V</div>
  <div class="tbf"></div>
  <button class="tbi" id="btnPip" title="Picture in Picture">📺</button>
  <button class="tbi" id="btnEdit">⚙</button>
</div>

<div class="db" id="db"></div>

<div class="em" id="em">
  <div class="em-c">
    <div class="em-h">
      <h3 class="em-t" id="emT">Налаштування</h3>
      <button class="em-x" id="emX">×</button>
    </div>
    <div class="em-b" id="emb"></div>
  </div>
</div>

<script>
// PARAMETERS METADATA
const P = {
  RPM:{n:'Обороти',u:'rpm',m:14000,c:'var(--cyan)',w:10000,r:12000},
  GpsSpd:{n:'Швидкість GPS',u:'km/h',m:180,c:'var(--cyan)'},
  T_Eng:{n:'Мотор',u:'°C',m:140,c:'var(--amber)',w:105,r:115},
  Volt:{n:'Вольтаж',u:'V',m:16,c:'var(--yellow)',w:11.5,r:11.0},
  TPS:{n:'Дросель',u:'%',m:100,c:'var(--green)'},
  In_V_Spd:{n:'Швидкість Колеса',u:'km/h',m:180,c:'var(--blue)'},
  Gear:{n:'Передача',u:'',m:6,c:'var(--green)'},
  CoreT:{n:'Процесор',u:'°C',m:100,c:'var(--muted)'}
};

// PARAMETER GROUPS
const PG = [
  {n:'Основне',k:['RPM','GpsSpd','Gear']},
  {n:'Двигун',k:['T_Eng','TPS','Volt']},
  {n:'Інше',k:['In_V_Spd','CoreT']}
];

// LIVE STATE VALUES (Ініціалізовано базовими значеннями, щоб уникнути помилок undefined)
let V = { RPM:0, GpsSpd:0, T_Eng:0, Volt:0, TPS:0, In_V_Spd:0, Gear:0, CoreT:0 };

// APP STATE
let lay = [];
let isEdit = false;
let ptile = null;

// PICTURE IN PICTURE STATE
let pipVideo = null;
let pipCanvas = null;
let pctx = null;
let pipInterval = null;

const DF = [
  {id:'t1',k:'RPM',sz:'s22',st:'gauge'},
  {id:'t2',k:'GpsSpd',sz:'s21',st:'flat'},
  {id:'t3',k:'T_Eng',sz:'s1',st:'flat'},
  {id:'t4',k:'Volt',sz:'s1',st:'flat'},
  {id:'t5',k:'Gear',sz:'s1',st:'flat'},
  {id:'t6',k:'TPS',sz:'s1',st:'flat'}
];

function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function ls(k,df){try{const r=localStorage.getItem(k);return r?JSON.parse(r):df}catch(e){return df}}

// RENDER DASHBOARD
function render(){
  const container = document.getElementById('db');
  container.innerHTML = '';
  
  lay.forEach(t => {
    const p = P[t.k];
    if(!p) return;
    
    const tile = document.createElement('div');
    tile.className = `tl ${t.sz}` + (isEdit ? ' edit-mode' : '');
    
    const name = document.createElement('div');
    name.className = 'tn';
    name.textContent = p.n;
    tile.appendChild(name);
    
    const valW = document.createElement('div');
    valW.className = 'tv-w';
    
    const val = document.createElement('div');
    val.className = 'tv';
    val.id = `v_${t.id}`;
    val.textContent = V[t.k] !== undefined ? V[t.k] : '--';
    valW.appendChild(val);
    
    if(p.u){
      const unit = document.createElement('div');
      unit.className = 'tu';
      unit.textContent = p.u;
      valW.appendChild(unit);
    }
    tile.appendChild(valW);
    
    if(t.st === 'gauge'){
      const gw = document.createElement('div');
      gw.className = 'g-w';
      const gb = document.createElement('div');
      gb.className = 'g-b';
      gb.id = `g_${t.id}`;
      gw.appendChild(gb);
      tile.appendChild(gw);
    }
    
    tile.addEventListener('click', () => {
      if(isEdit) bedit(t);
    });
    
    container.appendChild(tile);
  });
  up();
}

// UPDATE LIVE VALUES ONLY
function up(){
  document.getElementById('valVolt').textContent = (V.Volt ? V.Volt.toFixed(1) : '--') + 'V';
  
  lay.forEach(t => {
    const p = P[t.k];
    const el = document.getElementById(`v_${t.id}`);
    if(!el) return;
    
    let raw = V[t.k];
    let display = raw !== undefined ? raw : '--';
    el.textContent = display;
    
    if(p.r && raw >= p.r) el.style.color = 'var(--red)';
    else if(p.w && raw >= p.w) el.style.color = 'var(--amber)';
    else el.style.color = '#fff';
    
    const gb = document.getElementById(`g_${t.id}`);
    if(gb){
      let pct = Math.min(100, Math.max(0, (raw / p.m) * 100)) || 0;
      gb.style.width = `${pct}%`;
      if(p.r && raw >= p.r) gb.style.backgroundColor = 'var(--red)';
      else if(p.w && raw >= p.w) gb.style.backgroundColor = 'var(--amber)';
      else gb.style.backgroundColor = p.c;
    }
  });
}

// CONFIGURE PICTURE-IN-PICTURE (2 CHANNELS)
function initPip() {
  if (pipVideo) return;
  pipCanvas = document.createElement('canvas');
  pipCanvas.width = 240;
  pipCanvas.height = 120;
  pctx = pipCanvas.getContext('2d', { alpha: false });

  pipVideo = document.createElement('video');
  pipVideo.muted = true;
  pipVideo.playsInline = true;

  const stream = pipCanvas.captureStream(2); // 2 Кадри на секунду
  pipVideo.srcObject = stream;
}

function drawPipFrame() {
  if (!pctx) return;
  const W = pipCanvas.width, H = pipCanvas.height;
  
  pctx.fillStyle = '#0d0d0f'; 
  pctx.fillRect(0, 0, W, H);

  // Безпечне отримання параметрів (захист від undefined за допомогою знаку ?.)
  const temp = String(V?.T_Eng ?? '--');
  const speed = String(V?.GpsSpd ?? '--');

  pctx.textBaseline = 'middle';
  pctx.textAlign = 'center';

  // ЛІВА ПОЛОВИНА: ТЕМПЕРАТУРА
  pctx.fillStyle = '#ffb74d'; 
  pctx.font = '700 50px monospace';
  pctx.fillText(temp, W * 0.25, H * 0.45);

  pctx.fillStyle = '#666'; 
  pctx.font = '700 11px "Segoe UI", sans-serif';
  pctx.fillText('ТЕМП °C', W * 0.25, H * 0.82);

  // ПРАВА ПОЛОВИНА: ШВИДКІСТЬ GPS
  pctx.fillStyle = '#37e0e6'; 
  pctx.font = '700 50px monospace';
  pctx.fillText(speed, W * 0.75, H * 0.45);

  pctx.fillStyle = '#666';
  pctx.font = '700 11px "Segoe UI", sans-serif';
  pctx.fillText('GPS КМ/ГОД', W * 0.75, H * 0.82);
}

async function togglePip() {
  try {
    initPip();
    if (document.pictureInPictureElement) {
      await document.exitPictureInPicture();
      return;
    }
    drawPipFrame();
    if (pipInterval) clearInterval(pipInterval);
    pipInterval = setInterval(drawPipFrame, 500);

    pipVideo.play().then(async () => {
      await pipVideo.requestPictureInPicture();
    });
  } catch (e) {
    console.error("PiP error:", e);
  }
}

// SETUP MENU INTERFACE
function bmain(){
  document.getElementById('emT').textContent = 'Налаштування';
  const body = document.getElementById('emb'); body.innerHTML = '';
  
  const ab = document.createElement('button');
  ab.className = 'ab pr'; ab.textContent = '➕ Додати Плитку';
  ab.addEventListener('click', () => bedit(null));
  body.appendChild(ab);
  
  const cl = document.createElement('button');
  cl.className = 'ab dn'; cl.textContent = '🔄 Скинути Макет';
  cl.addEventListener('click', () => { if(confirm('Скинути макет?')){lay=[...DF];ss('lay2',lay);render();cpk();} });
  body.appendChild(cl);
}

function bedit(target){
  ptile = target;
  document.getElementById('emT').textContent = ptile ? 'Редагувати Плитку' : 'Додати Плитку';
  const body = document.getElementById('emb'); body.innerHTML = '';
  
  const pg = document.createElement('div'); pg.className = 'gt'; pg.textContent = 'Оберіть Показник'; body.appendChild(pg);
  const pl = document.createElement('div'); pl.className = 'pl';
  
  PG.forEach(g => {
    g.k.forEach(k => {
      const p = P[k];
      const item = document.createElement('div');
      item.className = 'pi' + (ptile?.k === k ? ' sel' : '');
      item.innerHTML = `<div><span class="pn2">${p.n}</span><span class="pc">${p.u}</span></div><div class="ck">✓</div>`;
      item.addEventListener('click', () => selp(k));
      pl.appendChild(item);
    });
  });
  body.appendChild(pl);
  
  if(ptile){
    const stg = document.createElement('div'); stg.className = 'gt'; stg.textContent = 'Стиль'; body.appendChild(stg);
    const sr = document.createElement('div'); sr.className = 'sr';
    [['flat','Цифри'],['gauge','Кільце']].forEach(([v,l])=>{
      const b=document.createElement('div');b.className='sb'+((ptile?.st||'flat')===v?' sel':'');
      b.textContent=l;b.addEventListener('click',()=>selst(v));sr.appendChild(b);
    });body.appendChild(sr);
    const szg = document.createElement('div'); szg.className = 'gt'; szg.textContent = 'Розмір'; body.appendChild(szg);
    const szr = document.createElement('div'); szr.className = 'szr';
    [['s1','1×1'],['s21','2×1'],['s22','2×2']].forEach(([v,l])=> {
      const b=document.createElement('div');b.className='sb'+((ptile?.sz||'s1')===v?' sel':'');
      b.textContent=l;b.addEventListener('click',()=>selsz(v));szr.appendChild(b);
    });body.appendChild(szr);
    
    const db = document.createElement('button'); db.className = 'ab dn'; db.textContent = '🗑 Видалити';
    db.addEventListener('click', () => { lay = lay.filter(t => t.id !== ptile.id); ss('lay2', lay); cpk(); render(); bmain(); });
    body.appendChild(db);
  }
}

function selp(k){
  if(ptile) { ptile.k = k; ss('lay2', lay); render(); bedit(ptile); }
  else {
    const id = 't' + Date.now();
    const nt = { id, k, sz: 's1', st: 'flat' };
    lay.push(nt); ss('lay2', lay); render(); bedit(nt);
  }
}
function selst(v){ if(ptile){ ptile.st = v; ss('lay2', lay); render(); bedit(ptile); } }
function selsz(v){ if(ptile){ ptile.sz = v; ss('lay2', lay); render(); bedit(ptile); } }
function cpk(){ document.getElementById('em').classList.remove('sh'); isEdit = false; document.getElementById('btnEdit').classList.remove('active'); render(); }

// INITIAL EVENTS
document.getElementById('btnEdit').addEventListener('click', () => {
  isEdit = !isEdit;
  document.getElementById('btnEdit').classList.toggle('active', isEdit);
  render();
});

document.getElementById('btnPip').addEventListener('click', togglePip);

document.getElementById('btnBle').addEventListener('click', () => {
  const modal = document.getElementById('em');
  modal.classList.add('sh');
  bmain();
});

document.getElementById('emX').addEventListener('click', cpk);

// SETUP CLEAN EXIT FROM PIP WINDOW
window.addEventListener('load', () => {
  lay = ls('lay2', DF);
  render();
  
  setTimeout(() => {
    if (pipVideo) {
      pipVideo.addEventListener('leavepictureinpicture', () => {
        if (pipInterval) { clearInterval(pipInterval); pipInterval = null; }
      });
    }
  }, 1000);
});
</script>
</body>
</html>
